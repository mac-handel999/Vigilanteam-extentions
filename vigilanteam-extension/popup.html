<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="leaflet.css" />
    
    <link rel="stylesheet" href="/public/styles.css">
    <link rel="stylesheet" href="popup.css">
</head>

<body>

    <div class="header">
        <div class="brand">{FABIAN CODES HQ} // VIGIL-TEEM</div>
    </div>

    <div class="section-title">[+] ACTIVE INTERCEPT SAFETY</div>
    <div class="metric-row" style="margin-top: 5px;">
        <span class="label">TARGET URL:</span>
        <span id="targetUrl" class="value">Analyzing...</span>
    </div>
    <div class="metric-row">
        <span class="label">THREAT STATUS:</span>
        <span id="safetyStatus" class="value" style="color: #00ffcc;">SCANNING...</span>
    </div>

    <div class="section-title">[+] NETWORK PERIMETER METRICS</div>
    <div class="metric-row" style="margin-top: 5px;">
        <span class="label">PUBLIC IPV4:</span>
        <span id="nodeIp" class="value">Detecting...</span>
    </div>
    <div class="metric-row">
        <span class="label">ISP CORE NET:</span>
        <span id="nodeIsp" class="value">Detecting...</span>
    </div>
    <div class="metric-row">
        <span class="label">COUNTRY MAP:</span>
        <span id="nodeCountry" class="value">Detecting...</span>
    </div>
    <div class="metric-row">
        <span class="label">REGION LOC:</span>
        <span id="nodeRegion" class="value">Detecting...</span>
    </div>
    <div class="metric-row">
        <span class="label">SPATIAL COORDS:</span>
        <span id="nodeCoords" class="value">Detecting...</span>
    </div>

    <div id="extMap"></div>

    <script src="popup.js"></script>
    <script src="leaflet.js"></script>
</body>

</html>
